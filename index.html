<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tic Tac Toe</title>
    <meta name="description" content="A modern, sleek implementation of the classic Tic Tac Toe game.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <button id="mute-btn">🔊 Sound On (M)</button>
    </div>

    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <div id="status">X's Turn</div>
        </header>

        <main class="board">
            <div id="win-line"></div>
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </main>

        <footer>
            <button id="reset-btn">Restart Game</button>
        </footer>
    </div>

    <script src="audio.js"></script>
    <script src="script.js"></script>
</body>
</html>
